<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AR Block Builder</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; color: white; font-family: 'Pretendard', sans-serif; }
        #webcam-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
        }

        /* Custom Scrollbar for Modal */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="relative w-screen h-screen">

    <!-- Webcam Background -->
    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- 3D Canvas -->
    <canvas id="three-canvas"></canvas>

    <!-- UI Overlay -->
    <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6">
        
        <!-- Header -->
        <header class="flex justify-between items-start">
            <div class="glass-panel px-6 py-4 shadow-lg">
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Gemini AR Builder</h1>
                <p class="text-sm text-gray-300 mt-1" id="status-text">웹캠 권한을 허용하고 손을 올려주세요...</p>
            </div>
            
            <div class="glass-panel px-4 py-3 flex items-center space-x-3">
                <div class="flex flex-col items-center">
                    <span class="text-xs text-gray-400 mb-1">현재 도형 (왼손 상하 조작)</span>
                    <div id="shape-indicator" class="w-10 h-10 border-2 border-white/50 rounded-lg flex items-center justify-center text-xl bg-white/10">
                        📦
                    </div>
                    <span id="shape-name" class="text-xs font-bold mt-1 text-blue-300">Box</span>
                </div>
            </div>
        </header>

        <!-- Center Indicators (Building Progress) -->
        <div class="flex-grow flex items-center justify-center">
            <div id="build-progress-container" class="hidden flex-col items-center glass-panel p-4 transition-opacity duration-300">
                <p class="text-sm mb-2 font-semibold text-yellow-300">블록 설치 중...</p>
                <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="build-progress-bar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 w-0 transition-all duration-100 ease-linear"></div>
                </div>
            </div>
        </div>

        <!-- Footer / Controls -->
        <footer class="flex justify-between items-end">
            <div class="glass-panel px-5 py-3 text-sm text-gray-200 w-64">
                <p class="font-bold mb-2 text-white border-b border-white/20 pb-1">✋ 제스처 안내</p>
                <ul class="space-y-1">
                    <li><span class="text-blue-400">🖐 오른손 보자기:</span> 위치 이동</li>
                    <li><span class="text-yellow-400">✊ 오른손 주먹(2초):</span> 블록 설치</li>
                    <li><span class="text-purple-400">✊ 왼손 주먹 + 상/하:</span> 도형 변경</li>
                </ul>
            </div>

            <!-- Ask AI Button (pointer events enabled here) -->
            <button id="ask-ai-btn" class="pointer-events-auto glass-panel px-6 py-4 flex items-center space-x-2 hover:bg-white/20 transition-all transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span class="font-bold text-lg">AI 아키텍트에게 묻기</span>
            </button>
        </footer>
    </div>

    <!-- AI Result Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="glass-panel p-8 max-w-2xl w-full mx-4 max-h-[85vh] flex flex-col relative">
            <button id="close-modal-btn" class="absolute top-4 right-4 text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <h2 class="text-3xl font-extrabold mb-6 flex items-center gap-3">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400">Gemini AI 아키텍트 분석</span>
                ✨
            </h2>
            
            <div id="ai-loading" class="flex flex-col items-center justify-center py-12">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-purple-500 mb-4"></div>
                <p class="text-lg text-purple-300 animate-pulse">구조물을 분석하고 의미를 부여하는 중입니다...</p>
            </div>

            <div id="ai-content" class="hidden overflow-y-auto pr-2 space-y-6">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Configuration & State
        // ==========================================
        const apiKey = ""; // Gemini API Key
        
        const state = {
            blocks: [], // Store placed block data
            currentShapeIndex: 0,
            shapes: [
                { name: "Box", emoji: "📦", geometry: new THREE.BoxGeometry(1, 1, 1) },
                { name: "Sphere", emoji: "🔮", geometry: new THREE.SphereGeometry(0.6, 32, 32) },
                { name: "Cylinder", emoji: "🛢️", geometry: new THREE.CylinderGeometry(0.5, 0.5, 1, 32) },
                { name: "Cone", emoji: "🔺", geometry: new THREE.ConeGeometry(0.6, 1, 32) }
            ],
            rightHand: { isFist: false, fistStartTime: 0, pos: new THREE.Vector3() },
            leftHand: { isFist: false, startY: 0 },
            isBuilding: false,
            buildThreshold: 2000, // 2 seconds to place a block
            gridSize: 1
        };

        // UI Elements
        const statusText = document.getElementById('status-text');
        const shapeIndicator = document.getElementById('shape-indicator');
        const shapeName = document.getElementById('shape-name');
        const buildProgressContainer = document.getElementById('build-progress-container');
        const buildProgressBar = document.getElementById('build-progress-bar');
        
        // ==========================================
        // 2. Three.js Setup (AR Environment)
        // ==========================================
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        // Renderer (Transparent background for AR effect)
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Helper Grid & Floor Plane
        const gridHelper = new THREE.GridHelper(20, 20, 0xffffff, 0xffffff);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

        // Cursor (Holographic preview of current block)
        let cursorMesh = new THREE.Mesh(
            state.shapes[state.currentShapeIndex].geometry,
            new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.5 })
        );
        scene.add(cursorMesh);

        // Group to hold placed blocks
        const blocksGroup = new THREE.Group();
        scene.add(blocksGroup);

        // Window Resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 3. MediaPipe Hands Tracking Logic
        // ==========================================
        const videoElement = document.getElementById('webcam');
        
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera_mp = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        camera_mp.start()
            .then(() => { statusText.innerText = "비전 시스템 준비 완료. 손을 올려주세요!"; })
            .catch(err => { statusText.innerText = "웹캠을 불러올 수 없습니다. 권한을 확인해주세요."; console.error(err); });

        // Helper: Check if hand is a fist
        function isFist(landmarks) {
            const wrist = landmarks[0];
            const tips = [8, 12, 16, 20]; // Index, Middle, Ring, Pinky tips
            const mcps = [5, 9, 13, 17];  // Base knuckles
            
            let isClosed = true;
            for(let i=0; i<4; i++) {
                const tipDist = Math.hypot(landmarks[tips[i]].x - wrist.x, landmarks[tips[i]].y - wrist.y);
                const mcpDist = Math.hypot(landmarks[mcps[i]].x - wrist.x, landmarks[mcps[i]].y - wrist.y);
                // If tip is closer to wrist than MCP, finger is folded
                if(tipDist > mcpDist) {
                    isClosed = false;
                    break;
                }
            }
            return isClosed;
        }

        function onResults(results) {
            let rightHandDetected = false;

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    // MediaPipe mirrors image, so Left label is actually Right hand of user
                    const classification = results.multiHandedness[i].label; 
                    const isRight = classification === 'Left'; // Mirrored logic
                    
                    const fistStatus = isFist(landmarks);

                    if (isRight) {
                        rightHandDetected = true;
                        handleRightHand(landmarks, fistStatus);
                    } else {
                        handleLeftHand(landmarks, fistStatus);
                    }
                }
            }

            if (!rightHandDetected) {
                // Reset right hand state if lost
                state.rightHand.isFist = false;
                state.isBuilding = false;
                buildProgressContainer.classList.add('hidden');
                cursorMesh.visible = false;
            }
        }

        // ==========================================
        // 4. Interaction Logic
        // ==========================================

        function handleRightHand(landmarks, fistStatus) {
            cursorMesh.visible = true;

            // Map index finger tip (8) or palm center (9) to screen coordinates
            // Use 9 (Middle MCP) for more stability
            const x = landmarks[9].x; 
            const y = landmarks[9].y;

            // Convert to Normalized Device Coordinates (-1 to 1)
            // X needs to be inverted because webcam is mirrored
            const ndcX = -((x * 2) - 1); 
            const ndcY = -((y * 2) - 1);

            // Raycast to find position on floor plane
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
            
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(floorPlane, intersectPoint);

            if (intersectPoint) {
                // Snap to Grid
                const gridX = Math.round(intersectPoint.x / state.gridSize) * state.gridSize;
                const gridZ = Math.round(intersectPoint.z / state.gridSize) * state.gridSize;
                
                // Calculate Stacking Y position
                const stackY = calculateStackHeight(gridX, gridZ);
                
                // Update cursor target position smoothly
                state.rightHand.pos.set(gridX, stackY + 0.5, gridZ);
            }

            // Gesture: Build (Fist hold)
            if (fistStatus) {
                if (!state.rightHand.isFist) {
                    state.rightHand.isFist = true;
                    state.rightHand.fistStartTime = Date.now();
                    state.isBuilding = true;
                    buildProgressContainer.classList.remove('hidden');
                    cursorMesh.material.color.setHex(0xffaa00); // Change cursor to orange indicating build mode
                } else {
                    const elapsed = Date.now() - state.rightHand.fistStartTime;
                    const progress = Math.min((elapsed / state.buildThreshold) * 100, 100);
                    buildProgressBar.style.width = `${progress}%`;

                    if (elapsed >= state.buildThreshold && state.isBuilding) {
                        placeBlock();
                        state.isBuilding = false; // Prevent multiple placement
                        buildProgressContainer.classList.add('hidden');
                        cursorMesh.material.color.setHex(0x00ffff);
                        // Reset timer slightly to allow continuous building if held, or require open hand
                        state.rightHand.fistStartTime = Date.now() + 1000; 
                    }
                }
            } else {
                state.rightHand.isFist = false;
                state.isBuilding = false;
                buildProgressContainer.classList.add('hidden');
                cursorMesh.material.color.setHex(0x00ffff);
            }
        }

        function handleLeftHand(landmarks, fistStatus) {
            if (fistStatus) {
                const y = landmarks[9].y; // Vertical position of hand
                if (!state.leftHand.isFist) {
                    state.leftHand.isFist = true;
                    state.leftHand.startY = y;
                } else {
                    // Calculate delta Y to change shape
                    const deltaY = y - state.leftHand.startY;
                    if (Math.abs(deltaY) > 0.15) { // Threshold to change
                        if (deltaY > 0) {
                            changeShape(1); // Move down -> next shape
                        } else {
                            changeShape(-1); // Move up -> prev shape
                        }
                        state.leftHand.startY = y; // Reset anchor
                    }
                }
            } else {
                state.leftHand.isFist = false;
            }
        }

        function changeShape(direction) {
            state.currentShapeIndex = (state.currentShapeIndex + direction + state.shapes.length) % state.shapes.length;
            const currentShape = state.shapes[state.currentShapeIndex];
            
            // Update UI
            shapeIndicator.innerText = currentShape.emoji;
            shapeName.innerText = currentShape.name;

            // Update Cursor Mesh
            scene.remove(cursorMesh);
            cursorMesh = new THREE.Mesh(
                currentShape.geometry,
                new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.5 })
            );
            scene.add(cursorMesh);
        }

        function calculateStackHeight(x, z) {
            let maxY = 0;
            state.blocks.forEach(b => {
                // If block is at same grid coordinate
                if (Math.abs(b.x - x) < 0.1 && Math.abs(b.z - z) < 0.1) {
                    // Basic height assumption: 1 unit per block
                    if (b.y > maxY) maxY = b.y;
                }
            });
            return maxY;
        }

        function placeBlock() {
            const currentShape = state.shapes[state.currentShapeIndex];
            
            // Generate random bright color for the block
            const hue = Math.random() * 360;
            const color = new THREE.Color(`hsl(${hue}, 80%, 60%)`);
            
            const material = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.2, 
                metalness: 0.1 
            });
            
            const mesh = new THREE.Mesh(currentShape.geometry, material);
            mesh.position.copy(state.rightHand.pos);
            
            // Add slight pop animation scale
            mesh.scale.set(0.1, 0.1, 0.1);
            
            blocksGroup.add(mesh);

            // Save data for AI analysis
            state.blocks.push({
                type: currentShape.name,
                x: mesh.position.x,
                y: mesh.position.y,
                z: mesh.position.z,
                color: color.getHexString()
            });

            // Animate scale up
            const expandInterval = setInterval(() => {
                if (mesh.scale.x < 1) {
                    mesh.scale.x += 0.1;
                    mesh.scale.y += 0.1;
                    mesh.scale.z += 0.1;
                } else {
                    mesh.scale.set(1, 1, 1);
                    clearInterval(expandInterval);
                }
            }, 16);
            
            // Sound feedback (simple beep using AudioContext)
            playBeep();
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // A5
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        // Three.js Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Smooth cursor movement
            if (cursorMesh.visible) {
                cursorMesh.position.lerp(state.rightHand.pos, 0.3);
            }

            // Slight rotation to blocks for dynamic feel
            blocksGroup.children.forEach(child => {
                if(child.geometry.type === 'SphereGeometry') {
                   child.rotation.y += 0.01;
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 5. Gemini AI Integration
        // ==========================================
        const askAiBtn = document.getElementById('ask-ai-btn');
        const modal = document.getElementById('ai-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const aiLoading = document.getElementById('ai-loading');
        const aiContent = document.getElementById('ai-content');

        // Exponential Backoff helper
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        askAiBtn.addEventListener('click', async () => {
            if (state.blocks.length === 0) {
                showModalError("건축물이 없습니다! 웹캠을 보고 손을 움직여 블록을 먼저 쌓아주세요.");
                return;
            }

            // Open Modal
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            aiLoading.classList.remove('hidden');
            aiContent.classList.add('hidden');
            aiContent.innerHTML = '';

            // 1. Prepare Data
            const blockDataStr = state.blocks.map(b => `${b.type} at (x:${b.x.toFixed(1)}, y:${b.y.toFixed(1)}, z:${b.z.toFixed(1)})`).join('\n');
            const totalBlocks = state.blocks.length;

            const prompt = `
당신은 창의적이고 통찰력 있는 '최고의 AI 아키텍트(건축가)'입니다.
사용자가 AR 환경에서 3D 블록을 사용하여 구조물을 만들었습니다.
총 블록 수: ${totalBlocks}개.
사용된 블록 데이터(종류 및 좌표):
${blockDataStr}

위 데이터를 분석하여, 이 구조물에 의미를 부여하고 창의적인 피드백을 제공해주세요.
반드시 아래 JSON 스키마 형식에 맞춰 응답하세요.`;

            // 2. Call Gemini API
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "당신은 한국어로 답변하는 따뜻하고 영감을 주는 AI 아키텍트입니다." }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                name: { type: "STRING", description: "구조물에 어울리는 창의적이고 멋진 이름" },
                                concept: { type: "STRING", description: "건축학적, 예술적 관점에서의 디자인 컨셉과 의미 해석 (3~4문장)" },
                                score: { type: "NUMBER", description: "구조적 안정성 및 시각적 균형 점수 (1~10)" },
                                analysis: { type: "STRING", description: "배치 밀도와 중심 분포를 기반으로 한 구조 분석" },
                                suggestion: { type: "STRING", description: "더 멋진 작품을 만들기 위한 건축학적 확장 제안" }
                            },
                            required: ["name", "concept", "score", "analysis", "suggestion"]
                        }
                    }
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const rawText = result.candidates[0].content.parts[0].text;
                const aiData = JSON.parse(rawText);

                renderAiResult(aiData);

            } catch (error) {
                console.error(error);
                showModalError("AI 분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            }
        });

        function renderAiResult(data) {
            aiLoading.classList.add('hidden');
            aiContent.classList.remove('hidden');

            // Render Stars for score
            const fullStars = Math.floor(data.score / 2);
            const halfStar = data.score % 2 >= 1 ? 1 : 0;
            const emptyStars = 5 - fullStars - halfStar;
            const starsHTML = '⭐'.repeat(fullStars) + (halfStar ? '🌟' : '') + '🌑'.repeat(emptyStars);

            aiContent.innerHTML = `
                <div class="text-center mb-6">
                    <p class="text-sm text-blue-300 font-bold tracking-widest uppercase">Project Name</p>
                    <h3 class="text-3xl font-bold text-white mt-1">"${data.name}"</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-white/5 rounded-xl p-4 border border-white/10">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-yellow-400 text-xl">🏗️</span>
                            <h4 class="font-bold text-gray-200">구조적 안정성</h4>
                        </div>
                        <div class="flex items-end gap-3">
                            <span class="text-4xl font-extrabold text-white">${data.score}</span>
                            <span class="text-gray-400 mb-1">/ 10 점</span>
                        </div>
                        <div class="mt-2 text-sm">${starsHTML}</div>
                    </div>
                    
                    <div class="bg-white/5 rounded-xl p-4 border border-white/10">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-green-400 text-xl">📊</span>
                            <h4 class="font-bold text-gray-200">배치 분석</h4>
                        </div>
                        <p class="text-sm text-gray-300 leading-relaxed">${data.analysis}</p>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-blue-900/40 to-purple-900/40 rounded-xl p-5 border border-purple-500/30 mb-4">
                    <h4 class="font-bold text-purple-300 mb-2 flex items-center gap-2"><span class="text-lg">✨</span> 디자인 컨셉 해석</h4>
                    <p class="text-gray-200 leading-relaxed text-sm">${data.concept}</p>
                </div>

                <div class="bg-gradient-to-br from-orange-900/40 to-red-900/40 rounded-xl p-5 border border-orange-500/30">
                    <h4 class="font-bold text-orange-300 mb-2 flex items-center gap-2"><span class="text-lg">🚀</span> 아키텍트의 제안</h4>
                    <p class="text-gray-200 leading-relaxed text-sm">${data.suggestion}</p>
                </div>
            `;
        }

        function showModalError(msg) {
            aiLoading.classList.add('hidden');
            aiContent.classList.remove('hidden');
            aiContent.innerHTML = `
                <div class="bg-red-500/20 border border-red-500 rounded-xl p-6 text-center">
                    <p class="text-red-200 text-lg">${msg}</p>
                </div>
            `;
            
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('opacity-0'), 10);
            }
        }

        closeModalBtn.addEventListener('click', () => {
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        });

    </script>
</body>
</html>
